<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WayneTech | SuperHero Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./scss/style.css">
</head>
<body>

    <header class="header">
        <div class="header-content">
            <h1 class="logo">ADA<span>COMICS</span></h1>
            <p class="tagline">BASE DE DATOS DE LA LIGA DE LA JUSTICIA</p>
        </div>
    </header>

    <main class="container">
        <section class="search-section">
            <div class="search-container">
                <h2>Búsqueda de Personajes</h2>
                <form id="search-form" class="search-form">
                    <div class="input-group">
                        <input type="text" id="search-input" class="input-search" placeholder="Ingresá tu búsqueda (ej. Batman)..." required>
                    </div>
                    
                    <div class="filters">
                        <div class="filter-item">
                            <label for="sort-order">ORDEN</label>
                            <select id="sort-order" class="select-dark">
                                <option value="asc">A - Z</option>
                                <option value="desc">Z - A</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-search">EJECUTAR BÚSQUEDA</button>
                    </div>
                </form>
            </div>
        </section>

        <section class="results-section">
            <div class="results-header">
                <h3>RESULTADOS: <span id="total-count">0</span></h3>
            </div>
            
            <div id="results-grid" class="results-grid">
                </div>
        </section>

        <nav class="pagination-container">
            <div class="pagination">
                <button id="first-page" class="btn-pag" title="Primera Página">«</button>
                <button id="prev-page" class="btn-pag" title="Anterior">‹</button>
                <span id="page-info" class="page-current">PÁGINA 1</span>
                <button id="next-page" class="btn-pag" title="Siguiente">›</button>
                <button id="last-page" class="btn-pag" title="Última Página">»</button>
            </div>
        </nav>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Wayne Enterprises - ADA Front End Project</p>
    </footer>

    <script src="./js/main.js"></script>
</body>
</html>
